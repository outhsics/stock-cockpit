# Stock Cockpit — one-command deployment
#
# Usage:
#   cp .env.example .env   # then edit LLM_API_KEY etc.
#   docker compose up -d --build
#   open http://localhost:8000
#
# A single multi-stage image (see ./Dockerfile) builds the React frontend,
# bundles it into the FastAPI container, and serves both the SPA (at /) and
# the API (at /api/*) on port 8000. One container, one URL.
#
# Data persistence: ./data is mounted for SQLite.

services:
  cockpit:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-cockpit:latest
    container_name: stock-cockpit
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-glm}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      LLM_MODEL: ${LLM_MODEL:-glm-4-flash}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.6}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      BRIEFING_CRON_HOUR: ${BRIEFING_CRON_HOUR:-5}
      BRIEFING_CRON_MINUTE: ${BRIEFING_CRON_MINUTE:-0}
      NEWS_REFRESH_MINUTES: ${NEWS_REFRESH_MINUTES:-30}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
